# ============================================================
# Pre-commit hooks — lab-playwright-expert
# ============================================================
# Установка:
#   pip install pre-commit
#   pre-commit install
#
# Запуск вручную:
#   pre-commit run --all-files
#   pre-commit run --files src/lab_playwright_kit/browser.py
#
# Пропустить хуки (экстренный случай):
#   git commit --no-verify
# ============================================================

default_language_version:
  python: python3.10

default_stages: [pre-commit]

repos:
  # ─── Ruff: линтинг ────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.7
    hooks:
      - id: ruff
        name: "ruff lint"
        args: [--fix, --exit-non-zero-on-fix]
        stages: [pre-commit]

  # ─── Ruff: форматирование ─────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.7
    hooks:
      - id: ruff-format
        name: "ruff format"
        stages: [pre-commit]

  # ─── MyPy: проверка типов ─────────────────────────────────
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.0
    hooks:
      - id: mypy
        name: "mypy type check"
        args:
          - --ignore-missing-imports
          - --no-error-summary
          - --python-version=3.10
        additional_dependencies:
          - types-requests
          - types-Pillow
        stages: [pre-commit]
        # MyPy может быть медленным — запускаем только при commit
        # Для полной проверки: make type-check

  # ─── Pytest: быстрые тесты ────────────────────────────────
  - repo: local
    hooks:
      - id: pytest-quick
        name: "pytest (quick)"
        entry: python -m pytest tests/ -x -q --tb=line -m "not slow" --no-header
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-commit]
        # Запускаем только быстрые тесты (без браузера)
        # Для полного прогона: make test

  # ─── Общие проверки ───────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        name: "trim trailing whitespace"
      - id: end-of-file-fixer
        name: "fix end of file"
      - id: check-yaml
        name: "check yaml"
        args: [--allow-multiple-documents]
      - id: check-toml
        name: "check toml"
      - id: check-json
        name: "check json"
      - id: check-added-large-files
        name: "check large files"
        args: ['--maxkb=500']
      - id: check-merge-conflict
        name: "check merge conflict"
      - id: check-case-conflict
        name: "check case conflict"
      - id: debug-statements
        name: "check debug statements"
        # Ловит breakpoint(), pdb.set_trace() и т.д.
      - id: detect-private-key
        name: "detect private keys"

  # ─── Bandit: безопасность ─────────────────────────────────
  - repo: https://github.com/PyCQA/bandit
    rev: '1.7.9'
    hooks:
      - id: bandit
        name: "bandit security"
        args: ["-c", "pyproject.toml"]
        additional_dependencies: ["bandit[toml]"]
        stages: [pre-commit]
