# ============================================================
# Docker Compose (Secure) — Screenshot-as-a-Service
# ============================================================
# Улучшения безопасности:
#   1. Non-root контейнер
#   2. Read-only root filesystem
#   3. Dropped capabilities + no-new-privileges
#   4. Seccomp профиль
#   5. Ограничение ресурсов (cgroup)
#   6. Изолированная сеть (no default bridge)
#   7. tmpfs для /tmp (noexec, nosuid)
#   8. API key через Docker secrets / env
# ============================================================


services:
  screenshot-service:
    build:
      context: .
      dockerfile: Dockerfile.secure
    image: lab-playwright-expert:${VERSION:-secure}
    container_name: screenshot-service
    restart: unless-stopped

    # ─── Сеть: только через reverse proxy ─────────────────────
    # Порт не экспонируется наружу — только в внутреннюю сеть
    expose:
      - "8190"
    # Если нужен прямой доступ для отладки — раскомментировать:
    # ports:
    #   - "127.0.0.1:8190:8190"

    environment:
      - SCREENSHOT_API_KEY=${SCREENSHOT_API_KEY}
      - CACHE_DIR=/tmp/screenshot_cache_secure
      - CACHE_TTL=300
      - PYTHONUNBUFFERED=1
      - RATE_LIMIT_REQUESTS=10
      - RATE_LIMIT_WINDOW=60

    # ─── Безопасность контейнера ──────────────────────────────
    read_only: true
    security_opt:
      - no-new-privileges:true
      # - seccomp:./config/chromium-seccomp.json  # если есть кастомный профиль
    cap_drop:
      - ALL
    cap_add:
      - CHOWN       # для установки прав на файлы
      - SETGID
      - SETUID
      - SYS_ADMIN   # нужен для Chromium sandbox (user namespaces)
      - SYS_CHROOT  # для Chromium chroot sandbox

    # ─── Ограничение ресурсов ─────────────────────────────────
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 512M
          cpus: "0.5"

    # ─── tmpfs для временных файлов ───────────────────────────
    tmpfs:
      - /tmp:size=512M,noexec,nosuid,uid=1001,gid=1001
      - /home/pptruser:size=64M,uid=1001,gid=1001

    # ─── Volumes ──────────────────────────────────────────────
    volumes:
      # Кэш скриншотов — именованный volume с ограничением
      - type: volume
        source: screenshot-cache
        target: /tmp/screenshot_cache_secure
        volume:
          nocopy: true

    # ─── Health check ─────────────────────────────────────────
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8190/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

    # ─── Логирование ──────────────────────────────────────────
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        tag: "screenshot-service"

    # ─── Сеть ─────────────────────────────────────────────────
    networks:
      - screenshot-net

    # ─── PID ограничение ──────────────────────────────────────
    pids_limit: 256

    # ─── Ulimits ──────────────────────────────────────────────
    ulimits:
      nproc: 128
      nofile:
        soft: 1024
        hard: 2048
      memlock:
        soft: 65536
        hard: 65536

  # ─── Nginx Reverse Proxy (опционально) ─────────────────────
  # Если нужен доступ извне — через nginx с TLS
  nginx:
    image: nginx:1.25-alpine
    container_name: screenshot-nginx
    restart: unless-stopped
    ports:
      - "127.0.0.1:8191:443"  # Только loopback
    volumes:
      - ./config/nginx-ssl.conf:/etc/nginx/conf.d/default.conf:ro
      - ./config/ssl:/etc/nginx/ssl:ro
    depends_on:
      screenshot-service:
        condition: service_healthy
    networks:
      - screenshot-net
    profiles:
      - with-nginx

volumes:
  screenshot-cache:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: "size=512m,mode=700,uid=1001"

networks:
  screenshot-net:
    driver: bridge
    internal: true  # Нет доступа в интернет по умолчанию
    ipam:
      config:
        - subnet: 172.28.0.0/24
