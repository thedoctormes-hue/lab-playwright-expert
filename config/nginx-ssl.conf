# ============================================================
# Nginx Reverse Proxy — Screenshot Service (SSL)
# ============================================================
# Обеспечивает:
#   - TLS 1.2+ termination
#   - Rate limiting на уровне proxy
#   - Security headers
#   - Ограничение размера тела запроса
#   - Только loopback binding (в docker-compose)
# ============================================================

# Rate limit зоны
limit_req_zone $binary_remote_addr zone=screenshot:10m rate=5r/s;
limit_req_zone $http_x_api_key zone=screenshot_key:10m rate=10r/m;

server {
    listen 443 ssl http2;
    server_name _;

    # ─── TLS ──────────────────────────────────────────────────
    ssl_certificate     /etc/nginx/ssl/screenshot.crt;
    ssl_certificate_key /etc/nginx/ssl/screenshot.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_tickets off;

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ─── Security Headers ──────────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Content-Security-Policy "default-src 'none'" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ─── Request Limits ────────────────────────────────────────
    client_max_body_size 1m;
    client_body_timeout 10s;
    client_header_timeout 10s;

    # ─── Proxy ─────────────────────────────────────────────────
    location /health {
        # Health check — без rate limit
        proxy_pass http://screenshot-service:8190;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        # Rate limiting
        limit_req zone=screenshot burst=5 nodelay;
        limit_req zone=screenshot_key burst=3 nodelay;
        limit_req_status 429;

        # Проксирование
        proxy_pass http://screenshot-service:8190;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Таймауты
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 60s;

        # Буферизация
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # ─── Запрет доступа к скрытым файлам ───────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }
}
